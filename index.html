<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#00D46A;--g2:#007B3D;--y:#FFD600;--r:#FF4444;
  --bg:#080C0D;--s1:#0F1416;--s2:#161C1E;--s3:#1C2326;--s4:#222A2D;
  --bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.1);
  --t:#EEF2F3;--t2:#8A9FA5;--t3:#4A5C61;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 100% 60% at 10% -10%,rgba(0,212,106,0.07) 0%,transparent 55%),radial-gradient(ellipse 70% 50% at 90% 110%,rgba(0,212,106,0.04) 0%,transparent 50%);pointer-events:none;z-index:0}

/* в”Ђв”Ђ HEADER в”Ђв”Ђ */
header{position:sticky;top:0;z-index:200;background:rgba(8,12,13,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd)}
.hdr{max-width:1120px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--g);line-height:1}
.logo em{color:var(--t);font-style:normal}
.hdr-right{display:flex;align-items:center;gap:14px}
.live-pill{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--g);background:rgba(0,212,106,.1);padding:4px 10px;border-radius:20px;border:1px solid rgba(0,212,106,.2)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:blink 1.6s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.clock{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3)}

/* в”Ђв”Ђ LAYOUT в”Ђв”Ђ */
.page{max-width:1120px;margin:0 auto;padding:24px 20px 60px;position:relative;z-index:1}
.grid{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}
@media(max-width:860px){.grid{grid-template-columns:1fr}}

/* в”Ђв”Ђ SECTION TITLES в”Ђв”Ђ */
.stitle{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--t);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.stitle span{color:var(--g)}
.stitle small{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-left:4px}

/* в”Ђв”Ђ HOY в”Ђв”Ђ */
.hoy-section{margin-bottom:24px}
.hoy-empty{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:20px;text-align:center;font-size:13px;color:var(--t3)}
.hoy-cards{display:flex;flex-direction:column;gap:8px}
.hoy-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;animation:up .35s ease both}
.hoy-card.fin{border-color:rgba(0,212,106,.18)}
.hoy-card.prox{border-color:var(--bd)}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.eq{display:flex;flex-direction:column;align-items:flex-start;gap:3px}
.eq.r{align-items:flex-end}
.eq-flag{font-size:26px;line-height:1}
.eq-name{font-size:13px;font-weight:600;color:var(--t)}
.centro{display:flex;flex-direction:column;align-items:center;gap:3px}
.score{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--g)}
.vstext{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--t3)}
.hora-tag{font-size:10px;font-family:'DM Mono',monospace;color:var(--t3)}
.fin-badge{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--g);background:rgba(0,212,106,.1);padding:2px 7px;border-radius:20px;border:1px solid rgba(0,212,106,.2)}
.sede-tag{font-size:10px;color:var(--t3);text-align:center;max-width:130px;line-height:1.4}

/* в”Ђв”Ђ TABLA POSICIONES в”Ђв”Ђ */
.tabla-box{background:var(--s1);border:1px solid var(--bd);border-radius:12px;overflow:hidden;position:sticky;top:76px}
.tabla-thead{display:grid;grid-template-columns:32px 1fr 44px 64px;padding:10px 16px;background:var(--s2);border-bottom:1px solid var(--bd);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)}
.tabla-row{display:grid;grid-template-columns:32px 1fr 44px 64px;padding:11px 16px;border-bottom:1px solid var(--bd);align-items:center;transition:background .15s;animation:up .3s ease both}
.tabla-row:last-child{border-bottom:none}
.tabla-row:hover{background:var(--s2)}
.tabla-row.r1{background:rgba(0,212,106,.05)}
.tabla-row.r1:hover{background:rgba(0,212,106,.09)}
.pos{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--t3)}
.r1 .pos{color:var(--g)}
.r2 .pos,.r3 .pos{color:var(--y)}
.jname{font-size:13px;font-weight:500;color:var(--t)}
.jsub{font-size:10px;color:var(--t3);margin-top:1px}
.pts{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--t);text-align:center}
.r1 .pts{color:var(--g)}
.pct-wrap{display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.pct-txt{font-size:11px;font-family:'DM Mono',monospace;color:var(--t2)}
.pct-bg{width:48px;height:3px;background:var(--s4);border-radius:2px;overflow:hidden}
.pct-fill{height:100%;background:var(--g);border-radius:2px;transition:width 1s ease}

/* в”Ђв”Ђ TODOS LOS RESULTADOS в”Ђв”Ђ */
.results-section{margin-top:24px}
.fecha-hdr{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--t3);padding:14px 0 8px;border-top:1px solid var(--bd);margin-top:4px}
.fecha-hdr:first-child{border-top:none;padding-top:0}
.res-list{display:flex;flex-direction:column;gap:5px}
.res-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;transition:background .15s}
.res-card:hover{background:var(--s2)}
.res-card.fin{border-color:rgba(0,212,106,.12)}

.res-eq.r{flex-direction:row-reverse;justify-content:flex-start}
.res-flag{font-size:18px;line-height:1}
.res-name{font-size:12px;font-weight:500;color:var(--t)}
.res-mid{display:flex;flex-direction:column;align-items:center;gap:2px}
.res-score{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--g)}
.res-vs{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;color:var(--t3)}
.res-hora{font-size:9px;font-family:'DM Mono',monospace;color:var(--t3)}

/* в”Ђв”Ђ LOADING / ERROR в”Ђв”Ђ */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 0;gap:12px;color:var(--t3);font-size:12px}
.spin{width:24px;height:24px;border:2px solid var(--bd2);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite}

.err{background:rgba(255,68,68,.06);border:1px solid rgba(255,68,68,.15);border-radius:8px;padding:12px 16px;font-size:12px;color:#FF8888;text-align:center}

/* в”Ђв”Ђ DIVIDER в”Ђв”Ђ */
.divider{height:1px;background:var(--bd);margin:24px 0}

// Orden de fechas
const FORD=["Jue 11 jun","Vie 12 jun","SГЎb 13 jun","Dom 14 jun","Lun 15 jun","Mar 16 jun","MiГ© 17 jun","Jue 18 jun","Vie 19 jun","SГЎb 20 jun","Dom 21 jun","Lun 22 jun","Mar 23 jun","MiГ© 24 jun","Jue 25 jun","Vie 26 jun","SГЎb 27 jun"];

// Fecha de hoy simulada como label (compara con f del partido)
// En producciГіn usamos la fecha real de Colombia
function getFechaHoy(){
  const d=new Date();
  // ajuste a COL (UTC-5)
  const col=new Date(d.getTime()-5*3600000);
  const dias=["Dom","Lun","Mar","MiГ©","Jue","Vie","SГЎb"];
  const meses=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return `${dias[col.getDay()]} ${col.getDate()} ${meses[col.getMonth()]}`;
}

async function fetchCSV(url){
  const r=await fetch(url+'&t='+Date.now());
  if(!r.ok)throw new Error(r.status);
  return r.text();
}

function parseCSV(txt){
  return txt.trim().split('\n').map(row=>{
    const cells=[];let cur='',inQ=false;
    for(let i=0;i<row.length;i++){
      const c=row[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cells.push(cur.trim());cur='';}
      else{cur+=c;}
    }
    cells.push(cur.trim());
    return cells;
  });
}

// Build resultado map from Resultados sheet
let resultadosMap={};

async function loadResultados(){
  const txt=await fetchCSV(URLS.results);
  const rows=parseCSV(txt).slice(1);
  resultadosMap={};
  rows.forEach(r=>{
    if(r[2]&&r[4]&&r[4].trim()){
      resultadosMap[parseInt(r[0])]=r[4].trim();
    }
  });
}

function getResLabel(num,local,visita){
  const res=resultadosMap[num];
  if(!res)return null;
  if(res==='Empate')return 'Empate';
  if(res===`Gana ${local}`)return local;
  if(res===`Gana ${visita}`)return visita;
  return res;
}

// в”Ђв”Ђ HOY в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderHoy(){
  const hoy=getFechaHoy();
  const partidos=PD.filter(p=>p.f===hoy);
  const el=document.getElementById('hoyBody');

  if(!partidos.length){
    // Mostrar prГіxima fecha con partidos
    const proxFecha=FORD.find(f=>PD.some(p=>p.f===f));
    el.innerHTML=`<div class="hoy-empty">No hay partidos hoy В· PrГіxima fecha: <strong>${proxFecha||'por definir'}</strong></div>`;
    return;
  }

  el.innerHTML=`<div class="hoy-cards">${partidos.map((p,i)=>{
    const res=resultadosMap[p.n];
    const fin=!!res;
    const resLabel=fin?getResLabel(p.n,p.l,p.v):'';
    return `
    <div class="hoy-card ${fin?'fin':'prox'}" style="animation-delay:${i*.07}s">
      <div class="eq">
        <div class="eq-flag">${flag(p.l)}</div>
        <div class="eq-name">${p.l}</div>
      </div>
      <div class="centro">
        ${fin?`<div class="score">${resLabel}</div><div class="fin-badge">Final</div>`:`<div class="vstext">VS</div>`}
        <div class="hora-tag">${p.h} (COL)</div>
        <div class="sede-tag">${p.s}</div>
      </div>
      <div class="eq r">
        <div class="eq-flag">${flag(p.v)}</div>
        <div class="eq-name">${p.v}</div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// в”Ђв”Ђ TODOS RESULTADOS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderTodosResultados(){
  const el=document.getElementById('resBody');
  const porFecha={};
  PD.forEach(p=>{
    if(!porFecha[p.f])porFecha[p.f]=[];
    porFecha[p.f].push(p);
  });

  el.innerHTML=FORD.map(fecha=>{
    const ps=porFecha[fecha]||[];
    const cards=ps.map(p=>{
      const res=resultadosMap[p.n];
      const fin=!!res;
      const resLabel=fin?getResLabel(p.n,p.l,p.v):'';
      return `
      <div class="res-card ${fin?'fin':''}">
        <div class="res-eq">
          <span class="res-flag">${flag(p.l)}</span>
          <span class="res-name">${p.l}</span>
        </div>
        <div class="res-mid">
          ${fin?`<div class="res-score">${resLabel}</div>`:
                `<div class="res-vs">VS</div><div class="res-hora">${p.h}</div>`}
        </div>
        <div class="res-eq r">
          <span class="res-flag">${flag(p.v)}</span>
          <span class="res-name">${p.v}</span>
        </div>
      </div>`;
    }).join('');
    return `<div class="fecha-hdr">${fecha}</div><div class="res-list">${cards}</div>`;
  }).join('');
}

// в”Ђв”Ђ TABLA в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function renderTabla(){
  const el=document.getElementById('tablaBody');
  try{
    const txt=await fetchCSV(URLS.tabla);
    const rows=parseCSV(txt).slice(1).filter(r=>r[1]&&r[1].trim());
    if(!rows.length){el.innerHTML='<div class="loading" style="color:var(--t3)">Sin datos aГєn</div>';return;}
    el.innerHTML=rows.map((r,i)=>{
      const cls=i===0?'r1':i===1?'r2':i===2?'r3':'';
      const pct=parseFloat(r[4])||0;
      const crown=i===0?' рџ‘‘':'';
      return `
      <div class="tabla-row ${cls}" style="animation-delay:${i*.04}s">
        <div class="pos">${r[0]||i+1}</div>
        <div><div class="jname">${r[1]}${crown}</div><div class="jsub">${r[3]||0} jugados</div></div>
        <div class="pts">${r[2]||0}</div>
        <div class="pct-wrap">
          <div class="pct-txt">${r[4]||'0%'}</div>
          <div class="pct-bg"><div class="pct-fill" style="width:${pct}%"></div></div>
        </div>
      </div>`;
    }).join('');
  }catch(e){el.innerHTML='<div class="err">Error al cargar tabla</div>';}
}

// в”Ђв”Ђ CLOCK в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function tickClock(){
  const d=new Date();
  const col=new Date(d.getTime()-5*3600000);
  const pad=n=>String(n).padStart(2,'0');
  document.getElementById('clock').textContent=`${pad(col.getHours())}:${pad(col.getMinutes())}:${pad(col.getSeconds())} COL`;
}

// в”Ђв”Ђ REFRESH в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function refresh(){
  try{
    await loadResultados();
    renderHoy();
    renderTodosResultados();
    await renderTabla();
  }catch(e){console.error(e);}
}

refresh();
setInterval(refresh,60000);
setInterval(tickClock,1000);
tickClock();
</script>
